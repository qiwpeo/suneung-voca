<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수능 영단어 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0e1a;--surface:#111827;--surface2:#1a2236;--surface3:#232d44;
--accent:#6366f1;--accent2:#818cf8;--accent3:#a5b4fc;
--green:#10b981;--green2:#34d399;--red:#ef4444;--red2:#f87171;
--orange:#f59e0b;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
--radius:16px;--radius-sm:10px;
}
html{font-size:16px}
body{font-family:'Noto Sans KR','Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 0%,rgba(99,102,241,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(16,185,129,.05) 0%,transparent 60%);pointer-events:none;z-index:0}

.app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:20px 16px 40px}

/* Header */
.header{text-align:center;padding:30px 0 20px}
.header h1{font-family:'Outfit',sans-serif;font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--green2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
.header p{color:var(--text2);font-size:.85rem;margin-top:6px;font-weight:300}

/* Setup Panel */
.setup{background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:28px 24px;margin-bottom:20px}
.setup h2{font-size:1.1rem;font-weight:700;margin-bottom:20px;color:var(--text)}
.opt-group{margin-bottom:20px}
.opt-group label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 16px;border-radius:40px;border:1.5px solid var(--surface3);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:.85rem;transition:all .2s;user-select:none;font-weight:500}
.chip:hover{border-color:var(--accent);color:var(--accent3)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 20px rgba(99,102,241,.25)}
.chip.active-green{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 0 20px rgba(16,185,129,.25)}

/* Quiz Mode Selector */
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode-card{padding:16px;border-radius:var(--radius-sm);border:1.5px solid var(--surface3);background:var(--surface2);cursor:pointer;transition:all .2s;text-align:center}
.mode-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.mode-card.active{border-color:var(--accent);background:rgba(99,102,241,.1);box-shadow:0 4px 20px rgba(99,102,241,.15)}
.mode-card .icon{font-size:1.6rem;margin-bottom:6px}
.mode-card .title{font-size:.85rem;font-weight:700;color:var(--text)}
.mode-card .desc{font-size:.7rem;color:var(--text3);margin-top:3px}

.btn-start{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;margin-top:20px;transition:all .2s;font-family:inherit;letter-spacing:-.2px}
.btn-start:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(99,102,241,.3)}
.btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* Progress bar */
.progress-wrap{margin-bottom:16px}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-info span{font-size:.75rem;color:var(--text3);font-weight:500}
.progress-info .qnum{color:var(--accent2);font-weight:700;font-size:.85rem}
.progress-bar{height:6px;background:var(--surface3);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:10px;transition:width .4s ease}

/* Quiz Card */
.quiz-card{background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:32px 24px;margin-bottom:16px;position:relative;overflow:hidden}
.quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--green))}
.quiz-label{font-size:.7rem;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.quiz-word{font-family:'Outfit',sans-serif;font-size:2.2rem;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-.5px}
.quiz-pos{font-size:.75rem;color:var(--accent3);font-weight:500;margin-bottom:20px;display:inline-block;padding:3px 10px;background:rgba(99,102,241,.1);border-radius:20px}
.quiz-hint{font-size:.8rem;color:var(--text3);margin-bottom:16px;font-style:italic;cursor:pointer;transition:color .2s}
.quiz-hint:hover{color:var(--text2)}
.quiz-hint.revealed{color:var(--text2);font-style:normal}

/* 4-choice */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.choice{padding:14px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--surface3);background:var(--surface2);cursor:pointer;font-size:.9rem;color:var(--text);transition:all .15s;text-align:left;font-family:inherit;line-height:1.4}
.choice:hover:not(.disabled){border-color:var(--accent);background:rgba(99,102,241,.08);transform:scale(1.01)}
.choice.correct{border-color:var(--green);background:rgba(16,185,129,.12);color:var(--green2);animation:pop .3s ease}
.choice.wrong{border-color:var(--red);background:rgba(239,68,68,.08);color:var(--red2);animation:shake .4s ease}
.choice.disabled{cursor:default;opacity:.6}
.choice.show-correct{border-color:var(--green);background:rgba(16,185,129,.08)}

/* Input mode */
.input-wrap{display:flex;gap:10px;margin-bottom:12px}
.input-wrap input{flex:1;padding:14px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--surface3);background:var(--surface2);color:var(--text);font-size:1rem;font-family:inherit;outline:none;transition:border-color .2s}
.input-wrap input:focus{border-color:var(--accent)}
.input-wrap input.correct-input{border-color:var(--green);background:rgba(16,185,129,.08)}
.input-wrap input.wrong-input{border-color:var(--red);background:rgba(239,68,68,.08)}
.btn-submit{padding:14px 24px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-submit:hover{background:#4f46e5}

/* Flashcard */
.flashcard{perspective:1000px;cursor:pointer;margin:20px 0}
.flashcard-inner{position:relative;width:100%;min-height:200px;transition:transform .5s;transform-style:preserve-3d}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{position:absolute;top:0;left:0;right:0;min-height:200px;backface-visibility:hidden;border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
.flashcard-front{background:linear-gradient(135deg,var(--surface2),var(--surface3));border:1.5px solid rgba(255,255,255,.06)}
.flashcard-back{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(16,185,129,.08));border:1.5px solid rgba(99,102,241,.2);transform:rotateY(180deg)}
.flashcard-front .big{font-family:'Outfit',sans-serif;font-size:2.4rem;font-weight:800;color:var(--text)}
.flashcard-front .sub{font-size:.8rem;color:var(--text3);margin-top:8px}
.flashcard-back .meaning{font-size:1.4rem;font-weight:700;color:var(--accent2);margin-bottom:8px}
.flashcard-back .example{font-size:.85rem;color:var(--text2);line-height:1.5}
.flash-btns{display:flex;gap:10px;justify-content:center;margin-top:16px}
.flash-btn{padding:12px 28px;border-radius:var(--radius-sm);border:none;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.flash-btn.know{background:var(--green);color:#fff}
.flash-btn.know:hover{box-shadow:0 4px 20px rgba(16,185,129,.3)}
.flash-btn.dunno{background:var(--red);color:#fff}
.flash-btn.dunno:hover{box-shadow:0 4px 20px rgba(239,68,68,.3)}
.flash-btn.skip{background:var(--surface3);color:var(--text2)}
.flip-hint{text-align:center;font-size:.75rem;color:var(--text3);margin-top:8px}

/* Answer feedback */
.feedback{margin-top:14px;padding:14px 16px;border-radius:var(--radius-sm);font-size:.85rem;line-height:1.5;display:none}
.feedback.show{display:block;animation:fadeIn .3s ease}
.feedback.correct-fb{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:var(--green2)}
.feedback.wrong-fb{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);color:var(--red2)}
.feedback strong{font-weight:700}
.feedback .example-text{margin-top:6px;color:var(--text2);font-size:.8rem}

.btn-next{width:100%;padding:13px;border:none;border-radius:var(--radius-sm);background:var(--surface3);color:var(--text);font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:12px;transition:all .2s}
.btn-next:hover{background:var(--surface2);border:1px solid var(--accent)}

/* Result */
.result{text-align:center;padding:40px 24px}
.result-circle{width:160px;height:160px;border-radius:50%;margin:0 auto 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.result-circle::before{content:'';position:absolute;inset:0;border-radius:50%;border:4px solid var(--surface3)}
.result-circle svg{position:absolute;inset:-2px;transform:rotate(-90deg)}
.result-circle svg circle{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1.5s ease}
.result-score{font-family:'Outfit',sans-serif;font-size:2.8rem;font-weight:800;line-height:1}
.result-total{font-size:.85rem;color:var(--text3);font-weight:500}
.result h2{font-size:1.3rem;font-weight:700;margin-bottom:8px}
.result p{color:var(--text2);font-size:.85rem;margin-bottom:4px}
.result-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:24px 0}
.stat-card{background:var(--surface2);border-radius:var(--radius-sm);padding:16px 10px;text-align:center}
.stat-card .stat-val{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:700}
.stat-card .stat-label{font-size:.7rem;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.stat-green{color:var(--green2)}
.stat-red{color:var(--red2)}
.stat-orange{color:var(--orange)}

.wrong-list{margin-top:20px;text-align:left}
.wrong-list h3{font-size:.9rem;font-weight:700;margin-bottom:12px;color:var(--red2)}
.wrong-item{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border-left:3px solid var(--red)}
.wrong-item .wi-word{font-family:'Outfit',sans-serif;font-weight:700;font-size:.95rem}
.wrong-item .wi-meaning{font-size:.8rem;color:var(--text2)}

.btn-restart{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;margin-top:16px;font-family:inherit;transition:all .2s}
.btn-restart:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(99,102,241,.3)}

/* Animations */
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease}

/* Responsive */
@media(max-width:520px){
.header h1{font-size:1.5rem}
.quiz-word{font-size:1.7rem}
.choices{grid-template-columns:1fr}
.mode-cards{grid-template-columns:1fr 1fr}
.result-stats{grid-template-columns:1fr 1fr 1fr}
.flashcard-front .big{font-size:1.8rem}
}

/* Number selector */
.num-select{display:flex;align-items:center;gap:12px}
.num-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--surface3);background:var(--surface2);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit}
.num-btn:hover{border-color:var(--accent)}
.num-display{font-family:'Outfit',sans-serif;font-size:1.3rem;font-weight:700;min-width:50px;text-align:center;color:var(--accent2)}
</style>
</head>
<body>
<div class="app" id="app">

<!-- SETUP SCREEN -->
<div id="screen-setup">
<div class="header">
<h1>수능 영단어 퀴즈</h1>
<p>고교기초부터 수능까지 · 672단어</p>
</div>
<div class="setup">
<h2>퀴즈 설정</h2>

<div class="opt-group">
<label>📚 단어 범위</label>
<div class="chips" id="levelChips">
<div class="chip active" data-lv="1">① 고교기초 (226)</div>
<div class="chip active" data-lv="2">② 고1-고2 (127)</div>
<div class="chip active" data-lv="3">③ 수능 핵심 (319)</div>
</div>
</div>

<div class="opt-group">
<label>🎮 퀴즈 모드</label>
<div class="mode-cards" id="modeCards">
<div class="mode-card active" data-mode="4choice">
<div class="icon">✅</div>
<div class="title">4지선다</div>
<div class="desc">영어 → 한국어 뜻 고르기</div>
</div>
<div class="mode-card" data-mode="4choice-rev">
<div class="icon">🔄</div>
<div class="title">4지선다 (역방향)</div>
<div class="desc">한국어 뜻 → 영단어 고르기</div>
</div>
<div class="mode-card" data-mode="typing">
<div class="icon">⌨️</div>
<div class="title">직접 입력</div>
<div class="desc">뜻 보고 영단어 타이핑</div>
</div>
<div class="mode-card" data-mode="flash">
<div class="icon">🃏</div>
<div class="title">플래시카드</div>
<div class="desc">카드 뒤집기 자기평가</div>
</div>
</div>
</div>

<div class="opt-group">
<label>📝 문제 수</label>
<div class="num-select">
<button class="num-btn" onclick="changeCount(-5)">−</button>
<div class="num-display" id="numDisplay">20</div>
<button class="num-btn" onclick="changeCount(5)">+</button>
<div style="display:flex;gap:6px;margin-left:8px">
<div class="chip" onclick="setCount(10)">10</div>
<div class="chip" onclick="setCount(20)">20</div>
<div class="chip" onclick="setCount(50)">50</div>
<div class="chip" onclick="setCount(0)">전체</div>
</div>
</div>
</div>

<button class="btn-start" id="btnStart" onclick="startQuiz()">퀴즈 시작</button>
</div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz" style="display:none">
<div class="progress-wrap">
<div class="progress-info">
<span class="qnum" id="qNum">1 / 20</span>
<span id="qScore">맞힌 수: 0</span>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>
<div id="quizContent"></div>
</div>

<!-- RESULT SCREEN -->
<div id="screen-result" style="display:none"></div>

</div>

odity.","ek":"석유는 귀중한 상품이다.","lv":3,"ln":"수능 핵심"},{"w":"compel","m":"강요하다","p":"동사","ee":"She felt compelled to help.","ek":"도와야 한다고 느꼈다.","lv":3,"ln":"수능 핵심"},{"w":"complacent","m":"자만하는, 안주하는","p":"형용사","ee":"Don't be complacent.","ek":"안주하지 마라.","lv":3,"ln":"수능 핵심"},{"w":"comply","m":"따르다, 준수하다","p":"동사","ee":"They complied with the law.","ek":"그들은 법을 준수했다.","lv":3,"ln":"수능 핵심"},{"w":"conceive","m":"생각해 내다, 임신하다","p":"동사","ee":"She conceived a new idea.","ek":"그녀가 새 아이디어를 생각해냈다.","lv":3,"ln":"수능 핵심"},{"w":"condemn","m":"비난하다, 선고하다","p":"동사","ee":"The world condemned the act.","ek":"세계가 그 행위를 비난했다.","lv":3,"ln":"수능 핵심"},{"w":"confess","m":"고백하다, 자백하다","p":"동사","ee":"He confessed to the crime.","ek":"그는 범행을 자백했다.","lv":3,"ln":"수능 핵심"},{"w":"conform","m":"따르다, 순응하다","p":"동사","ee":"Conform to the standard.","ek":"기준에 따라라.","lv":3,"ln":"수능 핵심"},{"w":"conquer","m":"정복하다","p":"동사","ee":"They conquered the territory.","ek":"그들은 영토를 정복했다.","lv":3,"ln":"수능 핵심"},{"w":"consensus","m":"합의, 의견 일치","p":"명사","ee":"We reached a consensus.","ek":"합의에 도달했다.","lv":3,"ln":"수능 핵심"},{"w":"consent","m":"동의, 동의하다","p":"명사/동사","ee":"She gave her consent.","ek":"그녀가 동의했다.","lv":3,"ln":"수능 핵심"},{"w":"contend","m":"주장하다, 경쟁하다","p":"동사","ee":"He contends that it's true.","ek":"그는 그것이 사실이라 주장한다.","lv":3,"ln":"수능 핵심"},{"w":"contingent","m":"~에 달린, 우발적인","p":"형용사","ee":"Success is contingent on effort.","ek":"성공은 노력에 달려 있다.","lv":3,"ln":"수능 핵심"},{"w":"contradict","m":"모순되다","p":"동사","ee":"Facts contradict his claims.","ek":"사실이 그의 주장과 모순된다.","lv":3,"ln":"수능 핵심"},{"w":"controversial","m":"논란이 많은","p":"형용사","ee":"A controversial topic.","ek":"논란이 많은 주제.","lv":3,"ln":"수능 핵심"},{"w":"converge","m":"수렴하다, 모이다","p":"동사","ee":"The roads converge at the center.","ek":"도로가 중심에서 만난다.","lv":3,"ln":"수능 핵심"},{"w":"coordinate","m":"조정하다, 조율하다","p":"동사","ee":"Coordinate the efforts.","ek":"노력을 조율해라.","lv":3,"ln":"수능 핵심"},{"w":"counterpart","m":"상대, 대응하는 것","p":"명사","ee":"Her Korean counterpart.","ek":"그녀의 한국측 상 let state = {
  levels: [1,2,3],
  mode: '4choice',
  count: 20,
  questions: [],
  current: 0,
  score: 0,
  wrongs: [],
  answered: false
};

// Setup interactions
document.querySelectorAll('#levelChips .chip').forEach(c => {
  c.addEventListener('click', () => {
    c.classList.toggle('active');
    state.levels = [...document.querySelectorAll('#levelChips .chip.active')].map(e => +e.dataset.lv);
    updateStartBtn();
  });
});

document.querySelectorAll('#modeCards .mode-card').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('#modeCards .mode-card').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    state.mode = c.dataset.mode;
  });
});

function changeCount(d) {
  state.count = Math.max(5, Math.min(672, state.count + d));
  document.getElementById('numDisplay').textContent = state.count;
}
function setCount(n) {
  if (n === 0) {
    const pool = VOCAB.filter(w => state.levels.includes(w.lv));
    state.count = pool.length || 20;
  } else {
    state.count = n;
  }
  document.getElementById('numDisplay').textContent = state.count;
}
function updateStartBtn() {
  document.getElementById('btnStart').disabled = state.levels.length === 0;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  const pool = VOCAB.filter(w => state.levels.includes(w.lv));
  if (pool.length === 0) return;
  state.questions = shuffle(pool).slice(0, Math.min(state.count, pool.length));
  state.current = 0;
  state.score = 0;
  state.wrongs = [];
  state.answered = false;

  document.getElementById('screen-setup').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  document.getElementById('screen-result').style.display = 'none';
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.current];
  const total = state.questions.length;
  state.answered = false;

  document.getElementById('qNum').textContent = `${state.current + 1} / ${total}`;
  document.getElementById('qScore').textContent = `맞힌 수: ${state.score}`;
  document.getElementById('progressFill').style.width = `${(state.current / total) * 100}%`;

  const content = document.getElementById('quizContent');

  if (state.mode === '4choice') {
    render4Choice(q, content, false);
  } else if (state.mode === '4choice-rev') {
    render4Choice(q, content, true);
  } else if (state.mode === 'typing') {
    renderTyping(q, content);
  } else if (state.mode === 'flash') {
    renderFlashcard(q, content);
  }
}

function getDistractors(correct, count, reverse) {
  const pool = VOCAB.filter(w => w.w !== correct.w);
  const shuffled = shuffle(pool);
  return shuffled.slice(0, count);
}

function render4Choice(q, el, reverse) {
  const distractors = getDistractors(q, 3, reverse);
  const options = shuffle([q, ...distractors]);

  el.innerHTML = `
    <div class="quiz-card fade-in">
      <div class="quiz-label">${q.ln} · ${q.p}</div>
      ${reverse 
        ? `<div class="quiz-word" style="font-family:'Noto Sans KR',sans-serif;font-size:1.5rem">${q.m}</div>`
        : `<div class="quiz-word">${q.w}</div>`
      }
      <div class="quiz-hint" id="hintBtn" onclick="revealHint()">💡 힌트 보기 (예문)</div>
      <div class="choices" id="choices">
        ${options.map((o, i) => `
          <button class="choice" data-idx="${i}" data-word="${o.w}" onclick="choose4(this,'${escape4(q.w)}',${reverse})">
            ${reverse ? o.w : o.m}
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btnNext" style="display:none" onclick="nextQuestion()">다음 →</button>
    </div>
  `;
}

function escape4(s) { return s.replace(/'/g, "\\'"); }

function revealHint() {
  const q = state.questions[state.current];
  const btn = document.getElementById('hintBtn');
  btn.textContent = `📖 ${q.ee}`;
  btn.classList.add('revealed');
}

function choose4(btn, correctWord, reverse) {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.current];
  const isCorrect = btn.dataset.word === correctWord;

  document.querySelectorAll('.choice').forEach(c => {
    c.classList.add('disabled');
    if (c.dataset.word === correctWord) c.classList.add(isCorrect && c === btn ? 'correct' : 'show-correct');
  });
  if (!isCorrect) btn.classList.add('wrong');

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    state.score++;
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = `<strong>정답! 🎉</strong><div class="example-text">${q.ee}<br>${q.ek}</div>`;
  } else {
    state.wrongs.push(q);
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = `<strong>오답 😢</strong> 정답: <strong>${q.w}</strong> — ${q.m}<div class="example-text">${q.ee}<br>${q.ek}</div>`;
  }
  document.getElementById('qScore').textContent = `맞힌 수: ${state.score}`;
  document.getElementById('btnNext').style.display = 'block';
}

function renderTyping(q, el) {
  el.innerHTML = `
    <div class="quiz-card fade-in">
      <div class="quiz-label">${q.ln} · ${q.p}</div>
      <div class="quiz-word" style="font-family:'Noto Sans KR',sans-serif;font-size:1.5rem">${q.m}</div>
      <div class="quiz-hint" id="hintBtn" onclick="revealHint()">💡 힌트 보기 (예문)</div>
      <div class="input-wrap">
        <input type="text" id="typingInput" placeholder="영단어를 입력하세요" autocomplete="off" autocapitalize="off" onkeydown="if(event.key==='Enter')checkTyping()">
        <button class="btn-submit" onclick="checkTyping()">확인</button>
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btnNext" style="display:none" onclick="nextQuestion()">다음 →</button>
    </div>
  `;
  setTimeout(() => document.getElementById('typingInput')?.focus(), 100);
}

function checkTyping() {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.current];
  const input = document.getElementById('typingInput');
  const answer = input.value.trim().toLowerCase();
  const correct = q.w.toLowerCase();
  const isCorrect = answer === correct;

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    state.score++;
    input.classList.add('correct-input');
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = `<strong>정답! 🎉</strong><div class="example-text">${q.ee}<br>${q.ek}</div>`;
  } else {
    state.wrongs.push(q);
    input.classList.add('wrong-input');
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = `<strong>오답 😢</strong> 정답: <strong>${q.w}</strong><div class="example-text">${q.ee}<br>${q.ek}</div>`;
  }
  document.getElementById('qScore').textContent = `맞힌 수: ${state.score}`;
  document.getElementById('btnNext').style.display = 'block';
}

function renderFlashcard(q, el) {
  el.innerHTML = `
    <div class="quiz-card fade-in">
      <div class="quiz-label">${q.ln} · ${q.p}</div>
      <div class="flashcard" id="flashcard" onclick="this.classList.toggle('flipped')">
        <div class="flashcard-inner">
          <div class="flashcard-front">
            <div class="big">${q.w}</div>
            <div class="sub">클릭하여 뒤집기</div>
          </div>
          <div class="flashcard-back">
            <div class="meaning">${q.m}</div>
            <div class="example">${q.ee}<br><span style="color:var(--text3)">${q.ek}</span></div>
          </div>
        </div>
      </div>
      <div class="flip-hint">카드를 클릭하면 뜻이 보입니다</div>
      <div class="flash-btns">
        <button class="flash-btn dunno" onclick="flashAnswer(false)">모름 ✗</button>
        <button class="flash-btn skip" onclick="flashAnswer(null)">넘기기</button>
        <button class="flash-btn know" onclick="flashAnswer(true)">알고있음 ✓</button>
      </div>
    </div>
  `;
}

function flashAnswer(know) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.current];
  if (know === true) {
    state.score++;
  } else if (know === false) {
    state.wrongs.push(q);
  }
  document.getElementById('qScore').textContent = `맞힌 수: ${state.score}`;
  nextQuestion();
}

function nextQuestion() {
  state.current++;
  if (state.current >= state.questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('screen-quiz').style.display = 'none';
  const el = document.getElementById('screen-result');
  el.style.display = 'block';

  const total = state.questions.length;
  const pct = Math.round((state.score / total) * 100);
  const circumference = 2 * Math.PI * 72;
  const offset = circumference - (pct / 100) * circumference;
  const color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : 'var(--red)';
  const msg = pct >= 90 ? '완벽해요! 🏆' : pct >= 70 ? '잘했어요! 👏' : pct >= 50 ? '조금 더 힘내요! 💪' : '복습이 필요해요 📖';

  el.innerHTML = `
    <div class="result fade-in">
      <div class="result-circle">
        <svg width="164" height="164" viewBox="0 0 164 164">
          <circle cx="82" cy="82" r="72" stroke="${color}" stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}" style="transition:stroke-dashoffset 1.5s ease" />
        </svg>
        <div class="result-score" style="color:${color}">${pct}%</div>
        <div class="result-total">${state.score} / ${total}</div>
      </div>
      <h2>${msg}</h2>
      <div class="result-stats">
        <div class="stat-card"><div class="stat-val stat-green">${state.score}</div><div class="stat-label">정답</div></div>
        <div class="stat-card"><div class="stat-val stat-red">${state.wrongs.length}</div><div class="stat-label">오답</div></div>
        <div class="stat-card"><div class="stat-val stat-orange">${total - state.score - state.wrongs.length}</div><div class="stat-label">건너뜀</div></div>
      </div>
      ${state.wrongs.length > 0 ? `
        <div class="wrong-list">
          <h3>틀린 단어 복습 📝</h3>
          ${state.wrongs.map(w => `
            <div class="wrong-item">
              <div><span class="wi-word">${w.w}</span></div>
              <div class="wi-meaning">${w.m}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
      ${state.wrongs.length > 0 ? `<button class="btn-restart" style="background:var(--red);margin-top:16px" onclick="retryWrongs()">틀린 단어만 다시 풀기</button>` : ''}
      <button class="btn-restart" onclick="goHome()">처음으로 돌아가기</button>
    </div>
  `;

  // Animate circle
  setTimeout(() => {
    el.querySelector('svg circle').style.strokeDashoffset = offset;
  }, 100);
}

function retryWrongs() {
  state.questions = shuffle(state.wrongs);
  state.current = 0;
  state.score = 0;
  state.wrongs = [];
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  renderQuestion();
}

function goHome() {
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-setup').style.display = 'block';
}
</script>
</body>
</html>
